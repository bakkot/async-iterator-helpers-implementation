<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Concurrent AsyncIterator .filter</title>
<style>
  :root {
    --idle-fill: #f3f3f5;
    --idle-stroke: #d8d8de;
    --pending-fill: #e7e7ef;
    --pending-stroke: #3b82f6;
    --settled-fill: #d6d6da;
    --settled-stroke: #9a9aa3;
    --voided-fill: #ede9fe;
    --voided-stroke: #8b5cf6;
    --voided-settled-fill: #cbbdf0;
    --errored-fill: #fee2e2;
    --errored-stroke: #ef4444;
    --errored-settled-fill: #efb0b0;
    --ink: #1f2933;
    --muted: #6b7280;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 28px 20px 40px;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    background: #f7f7f9;
  }

  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 650;
    letter-spacing: -0.01em;
  }
  h1 code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #ececed;
    padding: 1px 7px;
    border-radius: 6px;
    font-size: 0.92em;
  }
  /* `map` / `filter` in the header pick which set of animations is shown.
     The inactive one is an underlined link; the active one is the current
     selection (not a link) — same text/weight/color, marked instead by a
     single centered dot above it (a CSS pseudo-element, so no markup juggling
     and no ruby abuse). */
  h1 code a.setlink {
    color: inherit;
    text-decoration: underline;
    text-decoration-thickness: 1.5px;
    text-underline-offset: 3px;
    cursor: pointer;
  }
  h1 code a.setlink.active {
    text-decoration: none;
    cursor: default;
    pointer-events: none;
    position: relative;
  }
  h1 code a.setlink.active::after {
    content: "·";
    position: absolute;
    left: 0;
    right: 0;
    top: -0.66em;
    text-align: center;
    line-height: 1;
    font-weight: 800;
  }

  .stage {
    width: min(960px, 100%);
    background: #fff;
    border: 1px solid #e6e6ea;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    padding: 8px;
  }

  svg { width: 100%; height: auto; display: block; }

  /* ---- column headers ---- */
  .header {
    font: 600 19px ui-sans-serif, system-ui, sans-serif;
    fill: var(--muted);
    text-anchor: middle;
  }
  /* the closing band's headers are method calls, so they read in monospace */
  .header.ret { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 17px; }

  /* a tombstone marking a closed iterator, appended just past its column
     header. Its x is computed in JS (right of the header's measured edge) so
     the header itself stays centered; it fades in via the standard .reveal,
     so it wipes/replays with every other step like any other state. */
  .tomb {
    font-size: 19px;
    text-anchor: start;
    opacity: 0;
    transition: opacity .4s ease;
  }

  /* ============================================================
     VISUAL STATES — expressed purely as classes that JS toggles.
     The CSS just describes how each state looks and transitions;
     it knows nothing about step numbers. The <script> owns the
     timeline and flips these classes on/off per step.

       .box            idle (resting / empty)
       .box.pending    highlighted + swollen (active, unsettled)
       .box.settled    solid gray, holding a value (no hue, just weight)
       .reveal         a value/label/divider/arrow faded into view
       .gone           a group faded out (discarded)
       .slide-up       a group climbed one row (compaction)
       .incoming       a group parked just below the stack (baked in markup)
       .slide-in       ...that parked group slid into the freed slot
     ============================================================ */

  /* ---- boxes ---- */
  .box {
    fill: var(--idle-fill);
    stroke: var(--idle-stroke);
    stroke-width: 2;
    transform-box: fill-box;
    transform-origin: center;
    transition: fill .4s ease, stroke .4s ease, stroke-width .4s ease, transform .4s ease, opacity .4s ease;
  }
  .box.pending {
    fill: var(--pending-fill);
    stroke: var(--pending-stroke);
    stroke-width: 4;
    transform: scale(1.07);
  }
  .box.settled {
    fill: var(--settled-fill);
    stroke: var(--settled-stroke);
    stroke-width: 2.5;
  }
  /* a settled `done: true` box reads as exhausted — faint crosshatch fill */
  .box.settled.done { fill: url(#hatch); }
  /* a pull superseded by the source's completion — never delivers a value (purple) */
  .box.voided {
    fill: var(--voided-fill);
    stroke: var(--voided-stroke);
    stroke-width: 4;
    transform: scale(1.07);
  }
  /* an already-settled promise that is then voided: no highlight, no swell —
     styled like a completed (settled) box, but purple instead of gray */
  .box.settled.voided {
    fill: var(--voided-settled-fill);
    stroke: var(--voided-stroke);
    stroke-width: 2.5;
    transform: none;
  }
  /* an underlying pull (or the result it feeds) that settles with an *error* —
     styled like a settled box, but red instead of gray. The iterator is now
     closed; no value is ever delivered. */
  .box.errored {
    fill: var(--errored-fill);
    stroke: var(--errored-stroke);
    stroke-width: 4;
    transform: scale(1.07);
  }
  .box.settled.errored {
    fill: var(--errored-settled-fill);
    stroke: var(--errored-stroke);
    stroke-width: 2.5;
    transform: none;
  }

  /* text that lives inside a box, hidden until .reveal */
  .label, .val, .sub, .err {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    fill: var(--ink);
    text-anchor: middle;
    opacity: 0;
    transition: opacity .4s ease;
  }
  .val  { font-size: 30px; font-weight: 600; }
  /* the return() boxes hold a small `{}`, sized like the Internal labels */
  #closing .val text { font-size: 19px; }
  .label{ font-size: 19px; }
  .sub  { font-size: 19px; fill: var(--ink); font-weight: 600; }
  /* a centered "Error" in an Internal box (the predicate slot a failed pull
     feeds) — sized like the small `{}` in the .return() boxes */
  .err  { font-size: 19px; font-weight: 600; }
  /* "Error" in an Underlying/Result .val reads at that same smaller size.
     Keyed off the val's content (.errval, set in buildVal), not the box's
     transient .errored class — otherwise a back-step removes .errored and the
     text snaps 19px -> 30px while it's still fading out. */
  .val.errval text { font-size: 19px; }

  /* ---- flatMap inner-iterator boxes ----
     For flatMap the Internal stage maps each source value to an *iterator*.
     When the mapper settles, its box is replaced by that inner iterator,
     drawn as a short horizontal run of smaller (~2/3-size) promise boxes
     (#fi0..#fi3 wrappers holding #m00..#m33). They're parked hidden (.spare)
     for the map/filter sets and revealed (+shown) only when a flatMap step
     unfolds an iterator; the value text inside them is scaled to match. */
  .fmbox .val text { font-size: 19px; font-weight: 600; }
  .fmbox .val .rline { font-size: 12px; }

  /* a .val rendered as a two-line iterator record: `done: …` / `value: …` */
  .rline { font-size: 15px; font-weight: 400; text-anchor: start; }
  .rk { fill: var(--muted); }
  .rv { fill: var(--ink); font-weight: 700; }

  .divider {
    stroke: var(--idle-stroke);
    stroke-width: 1.5;
    opacity: 0;
    transition: opacity .4s ease;
  }

  /* arrows */
  .arrow {
    stroke: #475569;
    stroke-width: 3;
    fill: none;
    marker-end: url(#head);
    opacity: 0;
    transition: opacity .45s ease;
  }
  #head path { fill: #475569; }

  /* generic "now visible" — wins over the opacity:0 defaults above */
  .reveal { opacity: 1; }

  /* a discarded group fades out */
  g { transition: opacity .4s ease; }
  .gone { opacity: 0; }

  /* vertical compaction: move whole groups so their contents ride along.
     A box climbs one row (120 units) for each discarded box above it:
     .up1, .up2, .up3. Spare slots are parked below the stack (.spare,
     hidden) and a compaction spawns the next one into the freed bottom
     slot (.shown), climbing with the same .upN classes thereafter. */
  g[id] { transition: transform .4s ease, opacity .4s ease; }
  .up1 { transform: translateY(-120px); }
  .up2 { transform: translateY(-240px); }
  .up3 { transform: translateY(-360px); }
  .spare { opacity: 0; }   /* a not-yet-spawned spare slot, parked below the stack */
  .shown { opacity: 1; }   /* ...that spare has been spawned into view */

  /* ---- closing teardown band ----
     A pair of return() columns that slides in above the main diagram. The
     whole main group shifts down to make room; the band fades in (.shown).
     The taller viewBox is set by render() whenever #main is shifted. */
  #main.shifted { transform: translateY(180px); }
  #closing { opacity: 0; }              /* hidden until a close shifts it into view... */
  #closing.shown { opacity: 1; }        /* ...id-specificity override of the .shown default */
  /* the inner.return() column belongs only to flatMap; #viz gets a .flatmap
     class while that set is active (set in selectSet). */
  .flatmap-only { display: none; }
  #viz.flatmap .flatmap-only { display: inline; }

  /* during multi-step jumps we suppress animation and snap to the target */
  .no-anim * { transition: none !important; }

  /* ---- animation selector ---- */
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .tab {
    font: 500 14px ui-sans-serif, system-ui, sans-serif;
    padding: 7px 16px;
    border: 1px solid #d0d0d6;
    background: #fff;
    border-radius: 9px;
    color: var(--muted);
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
  }
  .tab:hover { background: #f1f1f4; }
  .tab.active {
    font-weight: 700;
    color: var(--ink);
    border-color: var(--pending-stroke);
    background: #eef2ff;
  }
  .tab.active:hover { background: #eef2ff; }

  /* ---- per-animation description (below the tabs, above the stage) ----
     Every animation's description is rendered at once and stacked into a
     single CSS-grid cell, so the box's height is the *tallest* description.
     Inactive ones stay laid out (visibility:hidden) but invisible; only the
     active one is shown. No JS measurement needed — the grid does the sizing. */
  .description {
    width: min(960px, 100%);
    display: grid;
  }
  .description > * {
    grid-area: 1 / 1;        /* stack all descriptions into one cell */
    visibility: hidden;      /* present for sizing, but not shown */
    margin: 0;
    padding: 12px 16px;
    font-size: 14.5px;
    line-height: 1.55;
    color: #374151;
    background: #fbfbfd;
    border: 1px solid #e6e6ea;
    border-radius: 10px;
  }
  .description > .active { visibility: visible; }
  .description code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #ececed;
    padding: 1px 5px;
    border-radius: 5px;
  }

  /* ---- controls ---- */
  .controls {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  button {
    font: 500 15px ui-sans-serif, system-ui, sans-serif;
    padding: 8px 18px;
    border: 1px solid #d0d0d6;
    background: #fff;
    border-radius: 9px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  button:hover:not(:disabled) { background: #f1f1f4; border-color: #b9b9c2; }
  button:disabled { opacity: 0.4; cursor: default; }
  .counter { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 14px; min-width: 64px; text-align: center; }

  .caption {
    width: min(960px, 100%);
    min-height: 48px;
    font-size: 15.5px;
    line-height: 1.5;
    color: #374151;
    text-align: center;
  }
  .caption code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #ececed;
    padding: 1px 5px;
    border-radius: 5px;
  }
  .hint { color: var(--muted); font-size: 12.5px; }

  /* ---- Interactive (live) mode ---- */
  /* the live tab — a shimmering, sparkly outlier among the scenario tabs */
  .tab.interactive {
    border-color: #c4b5fd;
    color: #6d28d9;
    font-weight: 700;
    background: linear-gradient(100deg, #fdf4ff, #eef2ff, #ecfeff, #eef2ff, #fdf4ff);
    background-size: 220% 100%;
    animation: ix-shimmer 4s linear infinite;
  }
  .tab.interactive:hover {
    background: linear-gradient(100deg, #f8ecff, #e6ecff, #e3fcff, #e6ecff, #f8ecff);
    background-size: 220% 100%;
  }
  .tab.interactive.active {
    color: #5b21b6;
    border-color: #8b5cf6;
    box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.25);
  }
  @keyframes ix-shimmer { to { background-position: 220% 0; } }

  /* a settleable promise: the box is clickable and wears a pulsing corner dot */
  .box.stimulus { cursor: pointer; }
  .stim-dot {
    fill: #f59e0b;
    stroke: #fff;
    stroke-width: 1.5;
    cursor: pointer;
    filter: drop-shadow(0 0 3px rgba(245, 158, 11, 0.9));
    animation: ix-dot 1.4s ease-in-out infinite;
  }
  @keyframes ix-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* the consumer's .next() button under the Result header */
  .ibtn { cursor: pointer; }
  .ibtn-bg { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; transition: fill .15s; }
  .ibtn:hover .ibtn-bg, .ibtn:hover .ibtn-header-bg { fill: #e0e7ff; }
  .ibtn-label {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 16px; font-weight: 600; fill: #3730a3;
  }
  .ibtn.disabled { opacity: 0.4; pointer-events: none; }
  /* the result.return() header, restyled as a button */
  .ibtn-header-bg { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.5; transition: fill .15s; }
  .ibtn-header { fill: #3730a3; }
</style>
</head>
<body>
  <h1>Concurrent <code>AsyncIterator.prototype.{<a id="sel-map" class="setlink">map</a>,<a id="sel-filter" class="setlink">filter</a>,<a id="sel-flatmap" class="setlink">flatMap</a>}</code></h1>

  <div class="tabs" id="tabs"></div>

  <div class="description" id="description"></div>

  <div class="stage">
    <svg id="viz" viewBox="0 0 900 560" role="img" aria-label="filter dataflow">
      <defs>
        <marker id="head" viewBox="0 0 10 10" refX="8" refY="5"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z"></path>
        </marker>
        <!-- faint crosshatch for a settled `done: true` (exhausted) box -->
        <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse"
                 patternTransform="rotate(45)">
          <rect width="6" height="6" fill="#d6d6da"></rect>
          <path d="M0 0 V6 M0 0 H6" stroke="#a9a9b3" stroke-width="0.9"></path>
        </pattern>
      </defs>

      <!-- everything below shifts down as a unit when a close opens the
           teardown band above (see #closing). -->
      <g id="main">
      <!-- column headers -->
      <text class="header" id="hdr-underlying" x="160" y="50">Underlying</text>
      <text class="header" x="450" y="50">Internal</text>
      <text class="header" id="hdr-result" x="740" y="50">Result</text>
      <!-- tombstones: shown (+reveal) when that iterator is closed. The x is
           set in JS to sit just past the header's right edge. -->
      <text class="tomb" id="tomb-underlying" y="50">🪦</text>
      <text class="tomb" id="tomb-result" y="50">🪦</text>

      <!-- arrows are generated per step from each step's `arrows` list -->
      <g id="arrows"></g>

      <!-- ===================== Underlying column ===================== -->
      <g id="u0">
        <rect class="box" x="95" y="85" width="130" height="90" rx="8"></rect>
        <g class="val" data-cx="160" data-cy="130"></g>
      </g>
      <g id="u1">
        <rect class="box" x="95" y="205" width="130" height="90" rx="8"></rect>
        <g class="val" data-cx="160" data-cy="250"></g>
      </g>
      <g id="u2">
        <rect class="box" x="95" y="325" width="130" height="90" rx="8"></rect>
        <g class="val" data-cx="160" data-cy="370"></g>
      </g>
      <g id="u3">
        <rect class="box" x="95" y="445" width="130" height="90" rx="8"></rect>
        <g class="val" data-cx="160" data-cy="490"></g>
      </g>

      <!-- ===================== Internal column ===================== -->
      <g id="i0">
        <rect class="box" x="385" y="85" width="130" height="90" rx="8"></rect>
        <text class="label" x="450" y="113" dominant-baseline="central"></text>
        <line class="divider" x1="397" y1="131" x2="503" y2="131"></line>
        <text class="sub" x="450" y="155" dominant-baseline="central"></text>
        <text class="err" x="450" y="130" dominant-baseline="central"></text>
      </g>
      <g id="i1">
        <rect class="box" x="385" y="205" width="130" height="90" rx="8"></rect>
        <text class="label" x="450" y="233" dominant-baseline="central"></text>
        <line class="divider" x1="397" y1="251" x2="503" y2="251"></line>
        <text class="sub" x="450" y="275" dominant-baseline="central"></text>
        <text class="err" x="450" y="250" dominant-baseline="central"></text>
      </g>
      <g id="i2">
        <rect class="box" x="385" y="325" width="130" height="90" rx="8"></rect>
        <text class="label" x="450" y="353" dominant-baseline="central"></text>
        <line class="divider" x1="397" y1="371" x2="503" y2="371"></line>
        <text class="sub" x="450" y="395" dominant-baseline="central"></text>
        <text class="err" x="450" y="370" dominant-baseline="central"></text>
      </g>
      <g id="i3">
        <rect class="box" x="385" y="445" width="130" height="90" rx="8"></rect>
        <text class="label" x="450" y="473" dominant-baseline="central"></text>
        <line class="divider" x1="397" y1="491" x2="503" y2="491"></line>
        <text class="sub" x="450" y="515" dominant-baseline="central"></text>
        <text class="err" x="450" y="490" dominant-baseline="central"></text>
      </g>
      <!-- spare slots parked below the stack; each compaction spawns the next
           one (.shown) up into the freed bottom slot -->
      <g id="i4" class="spare"><rect class="box" x="385" y="565" width="130" height="90" rx="8"></rect></g>
      <g id="i5" class="spare"><rect class="box" x="385" y="685" width="130" height="90" rx="8"></rect></g>

      <!-- =============== flatMap inner iterators (Internal) ===============
           One wrapper per Internal row (#fi0..#fi3), each holding four small
           promise boxes (#m{row}{col}) for the iterator the mapper returns.
           Parked hidden (.spare) until a flatMap step reveals the wrapper
           (+shown); map/filter never touch them. Same row centers as the main
           columns (y = 130 + row*120), so arrows line up. -->
      <g id="fi0" class="spare">
        <g id="m00" class="fmbox"><rect class="box" x="261" y="101" width="84" height="58" rx="6"></rect><g class="val" data-cx="303" data-cy="130"></g></g>
        <g id="m01" class="fmbox"><rect class="box" x="359" y="101" width="84" height="58" rx="6"></rect><g class="val" data-cx="401" data-cy="130"></g></g>
        <g id="m02" class="fmbox"><rect class="box" x="457" y="101" width="84" height="58" rx="6"></rect><g class="val" data-cx="499" data-cy="130"></g></g>
        <g id="m03" class="fmbox"><rect class="box" x="555" y="101" width="84" height="58" rx="6"></rect><g class="val" data-cx="597" data-cy="130"></g></g>
      </g>
      <g id="fi1" class="spare">
        <g id="m10" class="fmbox"><rect class="box" x="261" y="221" width="84" height="58" rx="6"></rect><g class="val" data-cx="303" data-cy="250"></g></g>
        <g id="m11" class="fmbox"><rect class="box" x="359" y="221" width="84" height="58" rx="6"></rect><g class="val" data-cx="401" data-cy="250"></g></g>
        <g id="m12" class="fmbox"><rect class="box" x="457" y="221" width="84" height="58" rx="6"></rect><g class="val" data-cx="499" data-cy="250"></g></g>
        <g id="m13" class="fmbox"><rect class="box" x="555" y="221" width="84" height="58" rx="6"></rect><g class="val" data-cx="597" data-cy="250"></g></g>
      </g>
      <g id="fi2" class="spare">
        <g id="m20" class="fmbox"><rect class="box" x="261" y="341" width="84" height="58" rx="6"></rect><g class="val" data-cx="303" data-cy="370"></g></g>
        <g id="m21" class="fmbox"><rect class="box" x="359" y="341" width="84" height="58" rx="6"></rect><g class="val" data-cx="401" data-cy="370"></g></g>
        <g id="m22" class="fmbox"><rect class="box" x="457" y="341" width="84" height="58" rx="6"></rect><g class="val" data-cx="499" data-cy="370"></g></g>
        <g id="m23" class="fmbox"><rect class="box" x="555" y="341" width="84" height="58" rx="6"></rect><g class="val" data-cx="597" data-cy="370"></g></g>
      </g>
      <g id="fi3" class="spare">
        <g id="m30" class="fmbox"><rect class="box" x="261" y="461" width="84" height="58" rx="6"></rect><g class="val" data-cx="303" data-cy="490"></g></g>
        <g id="m31" class="fmbox"><rect class="box" x="359" y="461" width="84" height="58" rx="6"></rect><g class="val" data-cx="401" data-cy="490"></g></g>
        <g id="m32" class="fmbox"><rect class="box" x="457" y="461" width="84" height="58" rx="6"></rect><g class="val" data-cx="499" data-cy="490"></g></g>
        <g id="m33" class="fmbox"><rect class="box" x="555" y="461" width="84" height="58" rx="6"></rect><g class="val" data-cx="597" data-cy="490"></g></g>
      </g>

      <!-- ===================== Result column ===================== -->
      <g id="r0">
        <rect class="box" x="675" y="85" width="130" height="90" rx="8"></rect>
        <g class="val" data-cx="740" data-cy="130"></g>
      </g>
      <g id="r1">
        <rect class="box" x="675" y="205" width="130" height="90" rx="8"></rect>
        <g class="val" data-cx="740" data-cy="250"></g>
      </g>
      <g id="r2">
        <rect class="box" x="675" y="325" width="130" height="90" rx="8"></rect>
        <g class="val" data-cx="740" data-cy="370"></g>
      </g>
      <g id="r3">
        <rect class="box" x="675" y="445" width="130" height="90" rx="8"></rect>
        <g class="val" data-cx="740" data-cy="490"></g>
      </g>
      </g><!-- /#main -->

      <!-- ===================== Closing teardown band =====================
           underlying.return() (left) and result.return() (right), with an
           inner.return() column in the middle that only applies to flatMap
           (its inner iterator also gets closed) — that column is marked
           .flatmap-only and stays hidden for the map/filter sets. Hidden
           until a close shows the band. -->
      <g id="closing">
        <text class="header ret" x="160" y="35">underlying.return()</text>
        <text class="header ret flatmap-only" x="450" y="35">inner.return()</text>
        <text class="header ret" x="740" y="35">result.return()</text>
        <g id="closing-arrows"></g>
        <g id="c0">
          <rect class="box" x="95" y="60" width="130" height="90" rx="8"></rect>
          <g class="val" data-cx="160" data-cy="105"></g>
        </g>
        <g id="c2" class="flatmap-only">
          <rect class="box" x="385" y="60" width="130" height="90" rx="8"></rect>
          <g class="val" data-cx="450" data-cy="105"></g>
        </g>
        <g id="c1">
          <rect class="box" x="675" y="60" width="130" height="90" rx="8"></rect>
          <g class="val" data-cx="740" data-cy="105"></g>
        </g>
      </g>
    </svg>
  </div>

  <div class="caption" id="caption"></div>

  <div class="controls">
    <button id="prev">◀ Prev</button>
    <span class="counter"><span id="stepnum">0</span> / <span id="stepmax">0</span></span>
    <button id="next">Next ▶</button>
  </div>
  <div class="hint">← / → (or space) to step · Home / End to jump</div>

  <script type="module" src="index-built.js"></script>
</body>
</html>
